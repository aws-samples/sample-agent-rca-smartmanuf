# Pre-commit hooks for SA demo projects
# Install: pip install pre-commit && pre-commit install
# Reference: https://console.harmony.a2z.com/engsec-docs/SA/using-gitlab-for-engagements

repos:
  # Secret detection — REQUIRED per Code Scanner Recommendations
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Strip Jupyter notebook outputs — prevents leaking account IDs, ARNs, PII
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # Prevent large files and common mistakes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-yaml
